<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#020617"/>
    </linearGradient>
    <linearGradient id="portGlow" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="shimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#eab308"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="500" height="500" fill="url(#bg)" rx="40"/>

  <!-- Network port / RJ45 outline -->
  <g transform="translate(250, 210)">
    <!-- Port housing -->
    <rect x="-80" y="-50" width="160" height="100" rx="8" fill="none" stroke="#1e293b" stroke-width="3"/>
    <rect x="-72" y="-42" width="144" height="84" rx="4" fill="#0f172a" stroke="#334155" stroke-width="2"/>

    <!-- Port inner socket (RJ45 opening) -->
    <rect x="-60" y="-30" width="120" height="60" rx="2" fill="#020617" stroke="#475569" stroke-width="1.5"/>

    <!-- Contact pins (8 pins like RJ45) -->
    <g opacity="0.6">
      <rect x="-52" y="-20" width="6" height="40" rx="1" fill="#06b6d4" opacity="0.3"/>
      <rect x="-38" y="-20" width="6" height="40" rx="1" fill="#06b6d4" opacity="0.3"/>
      <rect x="-24" y="-20" width="6" height="40" rx="1" fill="#06b6d4" opacity="0.3"/>
      <rect x="-10" y="-20" width="6" height="40" rx="1" fill="#06b6d4" opacity="0.4"/>
      <rect x="4" y="-20" width="6" height="40" rx="1" fill="#06b6d4" opacity="0.4"/>
      <rect x="18" y="-20" width="6" height="40" rx="1" fill="#06b6d4" opacity="0.3"/>
      <rect x="32" y="-20" width="6" height="40" rx="1" fill="#06b6d4" opacity="0.3"/>
      <rect x="46" y="-20" width="6" height="40" rx="1" fill="#06b6d4" opacity="0.3"/>
    </g>

    <!-- Shim tool entering port from the right -->
    <g filter="url(#softGlow)">
      <path d="M-60,-3 L-68,-3 L-72,5 L-68,13 L-60,13 L-56,5 Z" fill="url(#shimGrad)" opacity="0.9"/>
      <!-- Shim sliding in further -->
      <path d="M-68,-3 L-130,-3 L-130,3 L-68,3 Z" fill="url(#shimGrad)" opacity="0.85"/>
      <!-- Shim tip highlight -->
      <path d="M-72,5 L-68,-3 L-68,13 Z" fill="#fef08a" opacity="0.4"/>
    </g>

    <!-- Stealth lines on shim (indicating it's a tool) -->
    <line x1="-120" y1="0" x2="-80" y2="0" stroke="#0f172a" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- Text: PortShim -->
  <g transform="translate(250, 340)" text-anchor="middle">
    <!-- Port -->
    <text x="-45" y="0" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#e2e8f0" letter-spacing="1">Port</text>
    <!-- Shim - highlighted -->
    <text x="72" y="0" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#f59e0b" letter-spacing="1" filter="url(#glow)">Shim</text>
  </g>

  <!-- Tagline -->
  <text x="250" y="370" font-family="'Courier New', monospace" font-size="12" fill="#64748b" text-anchor="middle" letter-spacing="3" opacity="0.7">PICKING THE NETWORK, ONE PORT AT A TIME</text>

  <!-- Pulse dots (network activity) -->
  <circle cx="170" cy="390" r="2" fill="#06b6d4" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.1;0.6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="185" cy="390" r="2" fill="#06b6d4" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" begin="0.3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="390" r="2" fill="#06b6d4" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="2s" begin="0.6s" repeatCount="indefinite"/>
  </circle>

  <!-- Corner accents (security/tech decoration) -->
  <rect x="20" y="20" width="30" height="3" rx="1.5" fill="#f59e0b" opacity="0.4"/>
  <rect x="20" y="26" width="3" height="24" rx="1.5" fill="#f59e0b" opacity="0.4"/>
  <rect x="450" y="20" width="30" height="3" rx="1.5" fill="#f59e0b" opacity="0.4"/>
  <rect x="477" y="20" width="3" height="24" rx="1.5" fill="#f59e0b" opacity="0.4"/>
  <rect x="20" y="457" width="30" height="3" rx="1.5" fill="#f59e0b" opacity="0.4"/>
  <rect x="20" y="450" width="3" height="24" rx="1.5" fill="#f59e0b" opacity="0.4"/>
  <rect x="450" y="457" width="30" height="3" rx="1.5" fill="#f59e0b" opacity="0.4"/>
  <rect x="477" y="450" width="3" height="24" rx="1.5" fill="#f59e0b" opacity="0.4"/>

  <!-- Small circuit trace accents -->
  <path d="M30,60 L30,90 L50,90" fill="none" stroke="#1e293b" stroke-width="1.5" opacity="0.5"/>
  <path d="M470,60 L470,90 L450,90" fill="none" stroke="#1e293b" stroke-width="1.5" opacity="0.5"/>
  <path d="M30,440 L30,410 L50,410" fill="none" stroke="#1e293b" stroke-width="1.5" opacity="0.5"/>
  <path d="M470,440 L470,410 L450,410" fill="none" stroke="#1e293b" stroke-width="1.5" opacity="0.5"/>
</svg>
